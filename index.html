<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        .overlay-form {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10; 
            background: rgba(255, 255, 255, 0.8); 
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
    
    <div class="overlay-form">
        <h5 class="text-center">Ro'yxatdan o'ting</h5>
        <form>
            <div class="mb-2">
                <input type="text" class="form-control form-control-sm" placeholder="Ismingiz">
            </div>
            <div class="mb-2">
                <input type="tel" class="form-control form-control-sm" placeholder="">
                <input type="password" class="form-control form-control-sm" placeholder="" ></input>
            </div>
            
            <button type="submit" class="btn btn-primary btn-sm w-100">Yuborish</button>
           
        </form>
    </div>

    <div class="carousel-indicators">
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"></button>
    </div>

    <div class="carousel-inner">
        <div class="carousel-item active">
            <img src="https://media.architecturaldigest.com/photos/66758a12539a07cf706eefaa/16:9/w_2560%2Cc_limit/EMBARGO-BUGATTI-World-Premiere-Presskit-Images-26.jpg" class="d-block w-100" alt="...">
        </div>
        <div class="carousel-item">
            <img src="https://media.architecturaldigest.com/photos/66758a12539a07cf706eefaa/16:9/w_2560%2Cc_limit/EMBARGO-BUGATTI-World-Premiere-Presskit-Images-26.jpg" class="d-block w-100" alt="...">
        </div>
        <div class="carousel-item">
            <img src="https://media.architecturaldigest.com/photos/66758a12539a07cf706eefaa/16:9/w_2560%2Cc_limit/EMBARGO-BUGATTI-World-Premiere-Presskit-Images-26.jpg" class="d-block w-100" alt="...">
        </div>
    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
